version: '3.8'

services:
  # PostgreSQL Database - DOAR pentru credențiale/identitate
  # IPFS și Solid Server rulează LOCAL, nu în Docker!
  postgres:
    image: postgres:16-alpine
    container_name: solid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: solid_identity
      POSTGRES_USER: solid_user
      POSTGRES_PASSWORD: solid_password_change_me
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solid_user -d solid_identity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
